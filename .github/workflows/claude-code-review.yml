name: Claude Code Review

# Automatic, MIP-aware review on every PR. Requires ANTHROPIC_API_KEY (see .github/README.md).

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the MIP project. Focus on:
            - Correctness and test coverage (the engine has a ground-truth pytest suite).
            - Conformance to MIP principles: evidence + confidence on every fact,
              graceful degradation (dynamic/unknown -> needs_review, never asserted),
              explainability. See mip_design/00-foundation/ENGINEERING_PRINCIPLES.md.
            - If skills changed: is skills.catalog.json updated and does validate_catalog.py pass?
            Be concise and cite file:line. Post findings as PR comments.
          claude_args: "--allowed-tools Bash(gh:*),Bash(python:*),Read,Grep,Glob"
